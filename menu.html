<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drifter's Tale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #060a12; overflow: hidden; }

    #app {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }

    /* Boot screen — shown until HomeScreen is ready */
    #boot {
      position: fixed; inset: 0; z-index: 9999;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(20,30,45,0.5) 0%, transparent 60%),
        #060a12;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.8s ease;
      overflow: hidden;
    }
    #boot.hidden { opacity: 0; pointer-events: none; }

    /* Faint scanlines + grain so the boot screen reads as the same relay
       interface as the rest of the game, not a generic loading spinner. */
    #boot::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
      mix-blend-mode: multiply;
      opacity: 0.5;
    }
    #boot::after {
      content: '';
      position: absolute; inset: -10%; pointer-events: none;
      background: radial-gradient(circle at 20% 80%, rgba(84,230,164,0.05), transparent 40%);
    }

    .boot-eyebrow {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 0.6rem; letter-spacing: 0.32em;
      text-transform: uppercase; color: rgba(84,230,164,0.6);
      z-index: 1;
    }
    .boot-logo {
      font-family: 'Rajdhani', 'Courier New', monospace;
      font-size: clamp(1.8rem, 4.4vw, 2.8rem);
      font-weight: 600; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(210,222,238,0.95);
      z-index: 1;
    }
    .boot-sub {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 0.65rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(120,200,170,0.65);
      z-index: 1;
    }
    .boot-bar {
      width: 200px; height: 1px;
      background: rgba(84,230,164,0.12);
      position: relative; overflow: hidden;
      z-index: 1;
    }
    .boot-bar::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: rgba(84,230,164,0.55);
      animation: scan 1.4s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { left: -100%; }
      100% { left: 100%; }
    }

    /* Error state */
    #error {
      position: fixed; inset: 0; z-index: 9998;
      background: #060a12; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }
    #error.show { display: flex; }
    .err-title { font-size: 1rem; letter-spacing: 0.2em; color: rgba(255,122,106,0.9); text-transform: uppercase; }
    .err-msg   { font-size: 0.65rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); max-width: 420px; text-align: center; line-height: 1.7; white-space: pre-wrap; }
    .err-retry {
      margin-top: 8px; padding: 9px 22px;
      border: 1px solid rgba(255,122,106,0.4); background: transparent;
      color: rgba(255,122,106,0.85); font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
    }
    .err-retry:hover { background: rgba(255,122,106,0.1); }
  </style>
</head>
<body>

  <!-- AppShell renders itself here -->
  <div id="app"></div>

  <!-- Boot splash (gone once engine loads) -->
  <div id="boot">
    <div class="boot-eyebrow">WNCORE · Relay Station 7</div>
    <div class="boot-logo">Drifter's Tale</div>
    <div class="boot-bar"></div>
    <div class="boot-sub" id="boot-status">WNCORE · ESTABLISHING UPLINK</div>
  </div>

  <!-- Error state (shown if engine fails entirely) -->
  <div id="error">
    <div class="err-title">Signal Lost</div>
    <div class="err-msg" id="err-msg">Engine failed to initialise. Check console for details.</div>
    <button class="err-retry" onclick="location.reload()">Retry Connection</button>
  </div>

  <script type="module">
    // Block auto-init — we construct manually below
    window.__DRIFTER_NO_AUTO_INIT__ = true;

    const boot       = document.getElementById('boot');
    const bootStatus = document.getElementById('boot-status');
    const errorEl    = document.getElementById('error');
    const errMsg     = document.getElementById('err-msg');

    function hideBoot() {
      boot.classList.add('hidden');
      setTimeout(() => boot.remove(), 900);
    }

    function showError(msg) {
      hideBoot();
      errMsg.textContent = msg;
      errorEl.classList.add('show');
    }

    try {
      bootStatus.textContent = 'WNCORE · LOADING ENGINE';
      const { AppShell } = await import('./dist/ui/AppShell.js');
      bootStatus.textContent = 'WNCORE · INITIALISING';
      const app = new AppShell('app');
      app.run();
      window.__DRIFTER_APP = app;
      hideBoot();
    } catch (err) {
      console.error('[DRIFTER] Boot failed:', err);
      showError(`Boot error: ${err?.message ?? err}\n\nCheck the browser console for details.`);
    }
  </script>
</body>
</html>
